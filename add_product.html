

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product | ArtisanWay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-card { background: #1e293b; padding: 30px; border-radius: 15px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(212, 175, 55, 0.2); }
        h2 { color: #d4af37; margin-top: 0; }
        label { font-size: 0.8rem; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 18px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #fff; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>List New Item</h2>
        <form action="/add_product" method="POST">
            <label>Product Name</label>
            <input type="text" name="title" placeholder="e.g. Handwoven Basket" required>
            
            <label>Price (₹)</label>
            <input type="number" name="price" placeholder="500" required>
            
            <label>Category</label>
            <select name="category">
                <option value="Pottery">Pottery</option>
                <option value="Textiles">Textiles</option>
                <option value="Jewelry">Jewelry</option>
                <option value="Woodwork">Woodwork</option>
            </select>
            
            <label>Image URL (Use an online link or static path)</label>
            <input type="text" name="image_url" placeholder="https://images.unsplash.com/photo...">
            
            <button type="submit" class="btn">Publish to Marketplace</button>
            <a href="/dashboard" class="back-link">← Cancel and Go Back</a>
        </form>
    </div>
</body>
</html>

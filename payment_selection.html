<!DOCTYPE html>
<html>
<head>
    <title>Payment Method | ArtisanWay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; width: 420px; text-align: center; border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h2 { margin-bottom: 5px; }
        .price-tag { color: var(--gold); font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        
        .option-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }
        .option-card:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .icon { font-size: 28px; }
        
        #qrSection { display: none; margin-top: 20px; animation: fadeIn 0.4s; }
        .qr-box { background: white; padding: 15px; border-radius: 10px; display: inline-block; }
        .pay-done-btn { background: var(--gold); color: black; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Checkout</h2>
        <div class="price-tag">Total: ₹{{ product.price }}</div>

        <form action="/buy/{{ product.id }}" method="POST">
            <input type="hidden" name="payment_method" value="Cash on Delivery">
            <div class="option-card" onclick="this.parentElement.submit()">
                <div class="icon">💵</div>
                <div>
                    <div style="font-weight: bold;">Cash on Delivery</div>
                    <div style="font-size: 12px; color: #94a3b8;">Pay when the product arrives</div>
                </div>
            </div>
        </form>

        <div class="option-card" onclick="showQR()">
            <div class="icon">📱</div>
            <div>
                <div style="font-weight: bold;">UPI / Online Scanner</div>
                <div style="font-size: 12px; color: #94a3b8;">Scan QR to pay instantly</div>
            </div>
        </div>

        <div id="qrSection">
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=PayArtisan{{ product.id }}" alt="QR">
            </div>
            <p style="font-size: 12px; margin-top: 10px; color: #94a3b8;">Scan using PhonePe, GPay, or Paytm</p>
            <form action="/buy/{{ product.id }}" method="POST">
                <input type="hidden" name="payment_method" value="Online Prepaid">
                <button type="submit" class="pay-done-btn">Pay here</button>
            </form>
        </div>
    </div>

    <script>
        function showQR() {
            document.getElementById('qrSection').style.display = 'block';
        }
    </script>
</body>
</html>

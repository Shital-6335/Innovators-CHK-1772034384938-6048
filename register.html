<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Marketplace | Artisan Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        h2 { margin: 0 0 10px; color: var(--primary); }
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input { width: 100%; padding: 15px 0 5px; background: transparent; border: none; border-bottom: 2px solid #334155; color: white; outline: none; font-size: 1rem; }
        .input-group label { position: absolute; top: 15px; left: 0; color: #64748b; pointer-events: none; transition: 0.3s ease all; }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label { top: -12px; font-size: 0.8rem; color: var(--primary); font-weight: 600; }
        .input-group input:focus { border-bottom-color: var(--primary); }
        button { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 8px; color: #000; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #f1c40f; transform: translateY(-2px); }
        .switch { text-align: center; margin-top: 25px; font-size: 0.9rem; color: #94a3b8; }
        .switch a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Create Account</h2>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Start selling your handcrafted masterpieces today.</p>
        <form action="/register" method="POST">
            <div class="input-group">
                <input type="text" name="name" placeholder=" " required>
                <label>Full Name</label>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder=" " required>
                <label>Email Address</label>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder=" " required>
                <label>Create Password</label>
            </div>
            <button type="submit">Begin Your Journey</button>
        </form>
        <div class="switch">Already an artisan? <a href="/login">Login here</a></div>
    </div>
</body>
</html>
